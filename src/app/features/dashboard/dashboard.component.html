<h2>Dashboard</h2>

<div class="cards">
  <mat-card class="card">
    <mat-icon class="icon azul">people</mat-icon>
    <div class="info">
      <span class="numero">{{ totalUsuarios }}</span>
      <span class="label">Usuários</span>
    </div>
  </mat-card>

  <mat-card class="card">
    <mat-icon class="icon verde">category</mat-icon>
    <div class="info">
      <span class="numero">{{ totalCategorias }}</span>
      <span class="label">Categorias</span>
    </div>
  </mat-card>

  <mat-card class="card">
    <mat-icon class="icon roxo">inventory</mat-icon>
    <div class="info">
      <span class="numero">{{ totalProdutos }}</span>
      <span class="label">Produtos</span>
    </div>
  </mat-card>

  <mat-card class="card">
    <mat-icon class="icon laranja">list_alt</mat-icon>
    <div class="info">
      <span class="numero">{{ totalListas }}</span>
      <span class="label">Listas</span>
    </div>
  </mat-card>

  <mat-card class="card">
    <mat-icon class="icon vermelho">shopping_cart</mat-icon>
    <div class="info">
      <span class="numero">{{ totalItens }}</span>
      <span class="label">Itens</span>
    </div>
  </mat-card>
</div>
