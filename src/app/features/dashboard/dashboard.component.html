<div class="page-header">
  <h2>Dashboard</h2>
  <span class="subtitulo">Visão geral do sistema</span>
</div>

<div class="cards">
  <mat-card class="card">
    <div class="card-icon azul">
      <mat-icon>people</mat-icon>
    </div>
    <div class="info">
      <span class="numero">{{ totalUsuarios }}</span>
      <span class="label">Usuários</span>
    </div>
  </mat-card>

  <mat-card class="card">
    <div class="card-icon roxo">
      <mat-icon>category</mat-icon>
    </div>
    <div class="info">
      <span class="numero">{{ totalCategorias }}</span>
      <span class="label">Categorias</span>
    </div>
  </mat-card>

  <mat-card class="card">
    <div class="card-icon escuro">
      <mat-icon>inventory</mat-icon>
    </div>
    <div class="info">
      <span class="numero">{{ totalProdutos }}</span>
      <span class="label">Produtos</span>
    </div>
  </mat-card>

  <mat-card class="card">
    <div class="card-icon cinza">
      <mat-icon>list_alt</mat-icon>
    </div>
    <div class="info">
      <span class="numero">{{ totalListas }}</span>
      <span class="label">Listas</span>
    </div>
  </mat-card>

  <mat-card class="card">
    <div class="card-icon azul">
      <mat-icon>shopping_cart</mat-icon>
    </div>
    <div class="info">
      <span class="numero">{{ totalItens }}</span>
      <span class="label">Itens</span>
    </div>
  </mat-card>
</div>
