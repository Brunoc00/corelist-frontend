<div class="page-header">
  <h2>Listas de Compras</h2>
  <button mat-raised-button color="primary" (click)="abrirForm()">
    <mat-icon>add</mat-icon> Adicionar Lista
  </button>
</div>

<!-- Formulário -->
<mat-card *ngIf="mostrarForm" class="form-card">
  <mat-card-title>{{ editando ? 'Editar' : 'Nova' }} Lista</mat-card-title>
  <mat-card-content>
    <mat-form-field appearance="outline" class="field">
      <mat-label>Nome</mat-label>
      <input matInput [(ngModel)]="form.nome" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="field">
      <mat-label>Usuário</mat-label>
      <mat-select [(ngModel)]="form.usuario">
        <mat-option *ngFor="let u of usuarios" [value]="u.id">
          {{ u.nome }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="salvar()">Salvar</button>
    <button mat-button (click)="cancelar()">Cancelar</button>
  </mat-card-actions>
</mat-card>

<!-- Tabela -->
<mat-card class="table-card">
  <table mat-table [dataSource]="listas" class="full-width">

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let l">{{ l.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="usuario">
      <th mat-header-cell *matHeaderCellDef>Usuário</th>
      <td mat-cell *matCellDef="let l">{{ getNomeUsuario(l.usuario) }}</td>
    </ng-container>

    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef>Total</th>
      <td mat-cell *matCellDef="let l">R$ {{ l.total }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let l">
        <span [class]="l.is_active ? 'badge-ativo' : 'badge-inativo'">
          {{ l.is_active ? 'Ativo' : 'Inativo' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let l">
        <button mat-icon-button color="primary" (click)="editar(l)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deletar(l.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
  </table>
</mat-card>
