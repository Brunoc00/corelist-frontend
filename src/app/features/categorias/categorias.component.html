<div class="page-header">
  <h2>Categorias</h2>
  <button mat-raised-button color="primary" (click)="abrirForm()">
    <mat-icon>add</mat-icon> Adicionar Categoria
  </button>
</div>

<!-- Formulário -->
<mat-card *ngIf="mostrarForm" class="form-card">
  <mat-card-title>{{ editando ? 'Editar' : 'Nova' }} Categoria</mat-card-title>
  <mat-card-content>
    <mat-form-field appearance="outline" class="field">
      <mat-label>Nome</mat-label>
      <input matInput [(ngModel)]="form.nome" />
    </mat-form-field>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="salvar()">Salvar</button>
    <button mat-button (click)="cancelar()">Cancelar</button>
  </mat-card-actions>
</mat-card>

<!-- Tabela -->
<mat-card class="table-card">
  <table mat-table [dataSource]="categorias" class="full-width">

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let c">{{ c.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let c">
        <span [class]="c.is_active ? 'badge-ativo' : 'badge-inativo'">
          {{ c.is_active ? 'Ativo' : 'Inativo' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let c">
        <button mat-icon-button color="primary" (click)="editar(c)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deletar(c.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
  </table>
</mat-card>
